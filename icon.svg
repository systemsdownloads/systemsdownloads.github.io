<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a0608"/>
      <stop offset="100%" stop-color="#0b0c0f"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Subtle top glow -->
  <ellipse cx="256" cy="80" rx="200" ry="60" fill="#ff4f5e" opacity="0.07"/>

  <!-- Bottom accent line -->
  <rect x="80" y="430" width="352" height="3" rx="2" fill="#ff4f5e" opacity="0.35"/>

  <!-- CMDR text -->
  <text
    x="256"
    y="310"
    font-family="Arial Black, Impact, sans-serif"
    font-size="148"
    font-weight="900"
    fill="#ff4f5e"
    text-anchor="middle"
    filter="url(#glow)"
    letter-spacing="-4"
  >CMDR</text>
</svg>
